<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS 앱</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px; }
  .app { width: 100%; max-width: 420px; margin-top: 16px; }

  .app-header { text-align: center; margin-bottom: 20px; }
  .app-header h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; }
  .app-header p { font-size: 13px; color: #888; margin-top: 4px; }

  .tab-bar { display: flex; margin-bottom: 16px; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 4px; }
  .tab { flex: 1; padding: 9px; text-align: center; font-size: 13px; font-weight: 500; color: #888; cursor: pointer; border-radius: 7px; transition: all 0.15s; border: none; background: none; }
  .tab.active { background: #1a1a1a; color: #fff; }

  .card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 14px; padding: 28px 24px; }
  .card-label { font-size: 11px; color: #aaa; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .card-title { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 20px; }
  .section-label { font-size: 11px; color: #aaa; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .divider { height: 0.5px; background: #ebebeb; margin: 20px 0; }

  .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .product-btn { position: relative; padding: 18px 14px 14px; border-radius: 10px; border: 1px solid #e0e0e0; background: transparent; cursor: pointer; text-align: left; transition: all 0.12s; user-select: none; }
  .product-btn:hover { background: #f8f8f8; }
  .product-btn.has-qty { border: 2px solid #1a1a1a; background: #f8f8f8; }
  .product-btn-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .product-btn-price { font-size: 13px; color: #888; }
  .product-badge { position: absolute; top: -10px; right: -10px; width: 26px; height: 26px; border-radius: 50%; background: #1a1a1a; color: #fff; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.6); transition: all 0.15s; }
  .product-badge.show { opacity: 1; transform: scale(1); }

  .qty-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .qty-table th { font-size: 11px; color: #aaa; font-weight: 400; padding: 0 0 8px; text-align: right; }
  .qty-table th:first-child { text-align: left; }
  .qty-table td { padding: 10px 0; border-top: 0.5px solid #ebebeb; color: #1a1a1a; text-align: right; }
  .qty-table td:first-child { text-align: left; color: #666; }
  .qty-table tr.total-row td { font-weight: 600; font-size: 15px; border-top: 1px solid #ccc; padding-top: 12px; color: #1a1a1a; }
  .qty-table tr.total-row td:first-child { color: #1a1a1a; }
  .empty-row td { color: #ccc !important; font-size: 13px; text-align: center !important; padding: 16px 0 !important; }

  /* 결제수단 */
  .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pay-btn { padding: 18px 14px; border-radius: 10px; border: 1px solid #e0e0e0; background: transparent; cursor: pointer; font-size: 15px; font-weight: 500; color: #888; transition: all 0.15s; }
  .pay-btn:hover { background: #f8f8f8; color: #1a1a1a; }
  .pay-btn.selected { border: 2px solid #1a1a1a; background: #f8f8f8; color: #1a1a1a; }

  /* 현금 계산기 */
  .cash-calc { background: #f8f8f8; border-radius: 10px; padding: 16px; margin-top: 12px; }
  .cash-calc-title { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .cash-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .cash-row-label { font-size: 13px; color: #888; }
  .cash-row-val { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .cash-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .cash-input-label { font-size: 13px; color: #888; white-space: nowrap; }
  .cash-input { flex: 1; padding: 8px 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-weight: 600; color: #1a1a1a; background: #fff; outline: none; text-align: right; font-family: inherit; }
  .cash-input:focus { border-color: #1a1a1a; }
  .cash-divider { height: 0.5px; background: #e0e0e0; margin: 10px 0; }
  .cash-change-row { display: flex; justify-content: space-between; align-items: center; }
  .cash-change-label { font-size: 13px; color: #888; }
  .cash-change-val { font-size: 18px; font-weight: 700; color: #1a1a1a; }
  .cash-change-val.short { color: #e05; }

  /* 빠른금액 버튼 */
  .quick-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .quick-btn { padding: 5px 10px; border-radius: 20px; border: 0.5px solid #ddd; background: #fff; font-size: 12px; color: #666; cursor: pointer; transition: all 0.12s; }
  .quick-btn:hover { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  .checkout-btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #1a1a1a; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; margin-top: 16px; }
  .checkout-btn:hover { opacity: 0.85; }
  .checkout-btn:disabled { opacity: 0.25; cursor: default; }

  /* 결제 완료 */
  .result-card { text-align: center; }
  .result-icon { font-size: 48px; margin-bottom: 16px; }
  .result-amount { font-size: 36px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
  .result-rows { margin: 20px 0 20px; border-top: 0.5px solid #ebebeb; }
  .result-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid #ebebeb; font-size: 14px; }
  .result-row-label { color: #888; }
  .result-row-val { font-weight: 600; color: #1a1a1a; }
  .reset-btn { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #e0e0e0; background: none; cursor: pointer; font-size: 15px; color: #1a1a1a; transition: background 0.15s; }
  .reset-btn:hover { background: #f8f8f8; }

  /* 날짜 칩 */
  .date-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; }
  .date-scroll::-webkit-scrollbar { display: none; }
  .date-chip { padding: 7px 14px; border-radius: 20px; border: 1px solid #e0e0e0; background: #fff; font-size: 13px; color: #888; cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .date-chip.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .stat-box { background: #f8f8f8; border-radius: 10px; padding: 14px 16px; }
  .stat-box-label { font-size: 11px; color: #aaa; margin-bottom: 6px; }
  .stat-box-val { font-size: 20px; font-weight: 600; color: #1a1a1a; }

  .pay-stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pay-stat-box { border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 14px 16px; }
  .pay-stat-label { font-size: 11px; color: #aaa; margin-bottom: 6px; }
  .pay-stat-val { font-size: 17px; font-weight: 600; color: #1a1a1a; }
  .pay-stat-count { font-size: 12px; color: #888; margin-top: 3px; }

  /* 시제 박스 */
  .drawer-box { background: #1a1a1a; border-radius: 10px; padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .drawer-box-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .drawer-box-val { font-size: 18px; font-weight: 700; color: #fff; }
  .drawer-box-sub { font-size: 11px; color: #666; margin-top: 2px; }
  .drawer-edit-btn { padding: 6px 12px; border-radius: 20px; border: 0.5px solid #444; background: none; color: #aaa; font-size: 12px; cursor: pointer; }
  .drawer-edit-btn:hover { background: #333; color: #fff; }

  /* 시제 설정 모달 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 14px; padding: 24px; width: 300px; }
  .modal-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 16px; }
  .modal-input { width: 100%; padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 16px; font-weight: 600; color: #1a1a1a; outline: none; text-align: right; font-family: inherit; margin-bottom: 14px; }
  .modal-input:focus { border-color: #1a1a1a; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #e0e0e0; background: none; font-size: 14px; cursor: pointer; font-weight: 500; }
  .modal-btn.confirm { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  /* 건별 이력 */
  .history-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .history-item { border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; }
  .history-item-no { font-size: 12px; color: #aaa; }
  .history-item-amount { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
  .history-item-detail { font-size: 12px; color: #aaa; }
  .history-item-pay { font-size: 12px; color: #666; background: #f8f8f8; padding: 3px 8px; border-radius: 20px; }
  .mini-actions { display: flex; gap: 5px; margin-top: 2px; justify-content: flex-end; }
  .mini-btn { padding: 2px 8px; border-radius: 20px; border: 0.5px solid #ebebeb; background: none; cursor: pointer; font-size: 10px; color: #ccc; transition: all 0.15s; position: relative; overflow: hidden; line-height: 1.8; }
  .mini-btn:hover { color: #888; border-color: #ddd; background: #fafafa; }
  .mini-btn.delete-btn { color: #f0b8c0; border-color: #f5e0e5; }
  .mini-btn.delete-btn:hover { color: #e05; background: #fff5f7; }
  .mini-btn .del-bg { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: #ffe0ec; z-index: 0; }
  .mini-btn .del-label { position: relative; z-index: 1; }
  .memo-area { background: #f8f8f8; border-radius: 7px; padding: 7px 9px; margin-top: 8px; }
  .memo-text { font-size: 12px; color: #777; line-height: 1.5; white-space: pre-wrap; }
  .memo-input { width: 100%; border: none; background: transparent; font-size: 12px; color: #1a1a1a; resize: none; outline: none; font-family: inherit; line-height: 1.5; min-height: 40px; }
  .memo-save-row { display: flex; gap: 5px; margin-top: 5px; }
  .memo-save-btn { padding: 3px 10px; border-radius: 20px; border: 0.5px solid #e0e0e0; background: none; cursor: pointer; font-size: 11px; color: #888; }
  .memo-save-btn.save { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .history-empty { text-align: center; padding: 40px 0; font-size: 13px; color: #ccc; }

  .hidden { display: none; }
  @media (max-width: 480px) { body { padding: 12px; } .card { padding: 20px 16px; } }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>🛍️ POS 앱</h1>
    <p>맨투맨 · 반팔티</p>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="showTab('pos')">주문 입력</button>
    <button class="tab" onclick="showTab('history')">결제 이력</button>
  </div>

  <!-- POS 탭 -->
  <div id="tabPos">
    <div class="card" id="mainCard">
      <div class="card-label">POS</div>
      <div class="card-title">주문 입력</div>

      <div class="section-label">상품 선택 (클릭할수록 수량 증가)</div>
      <div class="product-grid">
        <button class="product-btn" id="pbA" onclick="addItem('A')">
          <div class="product-btn-name">맨투맨</div>
          <div class="product-btn-price">₩45,000</div>
          <div class="product-badge" id="badgeA">0</div>
        </button>
        <button class="product-btn" id="pbB" onclick="addItem('B')">
          <div class="product-btn-name">반팔티</div>
          <div class="product-btn-price">₩29,000</div>
          <div class="product-badge" id="badgeB">0</div>
        </button>
      </div>

      <div class="divider"></div>
      <div class="section-label">수량 / 금액</div>
      <table class="qty-table">
        <thead><tr><th>상품</th><th>수량</th><th>금액</th></tr></thead>
        <tbody id="qtyBody">
          <tr class="empty-row"><td colspan="3">상품을 선택하세요</td></tr>
        </tbody>
      </table>

      <div class="divider"></div>
      <div class="section-label">결제수단</div>
      <div class="pay-grid">
        <button class="pay-btn" id="payCard" onclick="selectPay(this,'카드')">💳 카드</button>
        <button class="pay-btn" id="payCash" onclick="selectPay(this,'현금')">💵 현금</button>
      </div>

      <!-- 현금 계산기 -->
      <div class="cash-calc hidden" id="cashCalc">
        <div class="cash-calc-title">현금 계산</div>
        <div class="cash-row">
          <span class="cash-row-label">결제할 금액</span>
          <span class="cash-row-val" id="calcDue">₩0</span>
        </div>
        <div class="cash-input-row">
          <span class="cash-input-label">받은 돈</span>
          <input class="cash-input" type="number" id="cashReceived" placeholder="0" oninput="calcChange()" />
        </div>
        <div class="quick-btns" id="quickBtns"></div>
        <div class="cash-divider"></div>
        <div class="cash-change-row">
          <span class="cash-change-label">거스름돈</span>
          <span class="cash-change-val" id="changeAmt">-</span>
        </div>
      </div>

      <button class="checkout-btn" id="checkoutBtn" onclick="goResult()" disabled>결제하기</button>
    </div>

    <div class="card result-card hidden" id="resultCard">
      <div class="result-icon">✅</div>
      <div style="font-size:13px;color:#888;margin-bottom:6px;">결제 완료</div>
      <div class="result-amount" id="resAmount">₩0</div>
      <div class="result-rows" id="resRows"></div>
      <button class="reset-btn" onclick="reset()">새 결제 시작</button>
    </div>
  </div>

  <!-- 이력 탭 -->
  <div id="tabHistory" class="hidden">
    <div class="card">
      <div class="card-label">날짜별 현황</div>
      <div class="card-title">결제 이력</div>

      <!-- 시제 현황 -->
      <div class="drawer-box">
        <div>
          <div class="drawer-box-label">💵 현재 시제 (현금 보유액)</div>
          <div class="drawer-box-val" id="drawerDisplay">₩0</div>
          <div class="drawer-box-sub" id="drawerSub">초기 시제 ₩0 + 현금매출 ₩0</div>
        </div>
        <button class="drawer-edit-btn" onclick="openDrawerModal()">시제 설정</button>
      </div>

      <div class="date-scroll" id="dateChips"></div>

      <div class="stat-grid">
        <div class="stat-box"><div class="stat-box-label">결제 건수</div><div class="stat-box-val" id="statCount">0건</div></div>
        <div class="stat-box"><div class="stat-box-label">총 매출</div><div class="stat-box-val" id="statTotal">₩0</div></div>
        <div class="stat-box"><div class="stat-box-label">맨투맨</div><div class="stat-box-val" id="statA">0개</div></div>
        <div class="stat-box"><div class="stat-box-label">반팔티</div><div class="stat-box-val" id="statB">0개</div></div>
      </div>

      <div class="divider"></div>
      <div class="section-label">결제수단별</div>
      <div class="pay-stat-row">
        <div class="pay-stat-box">
          <div class="pay-stat-label">💳 카드</div>
          <div class="pay-stat-val" id="statCard">₩0</div>
          <div class="pay-stat-count" id="statCardCount">0건</div>
        </div>
        <div class="pay-stat-box">
          <div class="pay-stat-label">💵 현금</div>
          <div class="pay-stat-val" id="statCash">₩0</div>
          <div class="pay-stat-count" id="statCashCount">0건</div>
        </div>
      </div>

      <div class="divider"></div>
      <div class="section-label">건별 내역</div>
      <div class="history-list" id="historyList">
        <div class="history-empty">아직 결제 내역이 없어요</div>
      </div>
    </div>
  </div>
</div>

<!-- 시제 설정 모달 -->
<div class="modal-overlay hidden" id="drawerModal">
  <div class="modal">
    <div class="modal-title">💵 시제 설정</div>
    <input class="modal-input" type="number" id="drawerInput" placeholder="보유 현금 입력" />
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeDrawerModal()">취소</button>
      <button class="modal-btn confirm" onclick="saveDrawer()">설정</button>
    </div>
  </div>
</div>

<script>
  const items = {
    A: { name: '맨투맨', price: 45000, qty: 0 },
    B: { name: '반팔티', price: 29000, qty: 0 }
  };
  let payMethod = null;
  let history = JSON.parse(localStorage.getItem('pos_history') || '[]');
  let txNo = history.length ? Math.max(...history.map(h => h.no)) + 1 : 1;
  let selectedDate = null;
  let editingMemo = null;
  let deleteTimer = null;
  let deleteTarget = null;
  let drawerAmount = parseInt(localStorage.getItem('pos_drawer') || '0');

  function fmt(n) { return '₩' + Math.round(n).toLocaleString(); }
  function save() { localStorage.setItem('pos_history', JSON.stringify(history)); }
  function saveDrawer() {
    const val = parseInt(document.getElementById('drawerInput').value) || 0;
    drawerAmount = val;
    localStorage.setItem('pos_drawer', val);
    closeDrawerModal();
    updateDrawerDisplay();
  }
  function openDrawerModal() {
    document.getElementById('drawerInput').value = drawerAmount || '';
    document.getElementById('drawerModal').classList.remove('hidden');
    document.getElementById('drawerInput').focus();
  }
  function closeDrawerModal() { document.getElementById('drawerModal').classList.add('hidden'); }

  function updateDrawerDisplay() {
    const cashSales = history.reduce((s,h) => s + (h.pay === '현금' ? h.totalAmt : 0), 0);
    const total = drawerAmount + cashSales;
    document.getElementById('drawerDisplay').textContent = fmt(total);
    document.getElementById('drawerSub').textContent = `초기 시제 ${fmt(drawerAmount)} + 현금매출 ${fmt(cashSales)}`;
  }

  function dateKey(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function dateLabel(key) {
    const today = dateKey(new Date().toISOString());
    const yesterday = dateKey(new Date(Date.now() - 86400000).toISOString());
    if (key === today) return '오늘';
    if (key === yesterday) return '어제';
    const [y, m, d] = key.split('-');
    return `${y}.${m}.${d}`;
  }

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0)===(tab==='pos')));
    document.getElementById('tabPos').classList.toggle('hidden', tab !== 'pos');
    document.getElementById('tabHistory').classList.toggle('hidden', tab !== 'history');
    if (tab === 'history') { updateDrawerDisplay(); renderHistory(); }
  }

  function addItem(key) {
    items[key].qty++;
    const badge = document.getElementById('badge' + key);
    badge.textContent = items[key].qty;
    badge.classList.add('show');
    document.getElementById('pb' + key).classList.add('has-qty');
    renderTable();
    updateCheckout();
    if (payMethod === '현금') updateCashCalc();
  }

  function renderTable() {
    const body = document.getElementById('qtyBody');
    const active = Object.entries(items).filter(([,v]) => v.qty > 0);
    if (active.length === 0) {
      body.innerHTML = '<tr class="empty-row"><td colspan="3">상품을 선택하세요</td></tr>';
      return;
    }
    let totalQty = 0, totalAmt = 0, html = '';
    for (const [,v] of active) {
      const amt = v.price * v.qty;
      totalQty += v.qty; totalAmt += amt;
      html += `<tr><td>${v.name}</td><td>${v.qty}개</td><td>${fmt(amt)}</td></tr>`;
    }
    html += `<tr class="total-row"><td>합계</td><td>${totalQty}개</td><td>${fmt(totalAmt)}</td></tr>`;
    body.innerHTML = html;
  }

  function getTotal() {
    return Object.values(items).reduce((s,v) => s + v.price * v.qty, 0);
  }

  function selectPay(btn, method) {
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    payMethod = method;
    if (method === '현금') {
      document.getElementById('cashCalc').classList.remove('hidden');
      updateCashCalc();
    } else {
      document.getElementById('cashCalc').classList.add('hidden');
    }
    updateCheckout();
  }

  function updateCashCalc() {
    const total = getTotal();
    document.getElementById('calcDue').textContent = fmt(total);
    document.getElementById('cashReceived').value = '';
    document.getElementById('changeAmt').textContent = '-';
    document.getElementById('changeAmt').className = 'cash-change-val';

    // 빠른 금액 버튼 생성 (올림 단위들)
    const units = [1000, 5000, 10000, 50000];
    const quickAmts = [];
    for (const u of units) {
      const rounded = Math.ceil(total / u) * u;
      if (!quickAmts.includes(rounded) && rounded >= total) quickAmts.push(rounded);
      if (quickAmts.length >= 5) break;
    }
    // 중복 제거 & 최대 5개
    const unique = [...new Set(quickAmts)].slice(0, 5);
    document.getElementById('quickBtns').innerHTML = unique.map(amt =>
      `<button class="quick-btn" onclick="setQuick(${amt})">${fmt(amt)}</button>`
    ).join('');
  }

  function setQuick(amt) {
    document.getElementById('cashReceived').value = amt;
    calcChange();
  }

  function calcChange() {
    const total = getTotal();
    const received = parseInt(document.getElementById('cashReceived').value) || 0;
    const change = received - total;
    const el = document.getElementById('changeAmt');
    if (received === 0) {
      el.textContent = '-';
      el.className = 'cash-change-val';
    } else if (change < 0) {
      el.textContent = `${fmt(Math.abs(change))} 부족`;
      el.className = 'cash-change-val short';
    } else {
      el.textContent = fmt(change);
      el.className = 'cash-change-val';
    }
    updateCheckout();
  }

  function updateCheckout() {
    const hasItems = Object.values(items).some(v => v.qty > 0);
    let ok = hasItems && !!payMethod;
    if (payMethod === '현금') {
      const total = getTotal();
      const received = parseInt(document.getElementById('cashReceived').value) || 0;
      ok = ok && received >= total;
    }
    document.getElementById('checkoutBtn').disabled = !ok;
  }

  function goResult() {
    const active = Object.entries(items).filter(([,v]) => v.qty > 0);
    let totalQty = 0, totalAmt = 0, rowsHtml = '';
    const snapshot = {};
    for (const [k,v] of active) {
      const amt = v.price * v.qty;
      totalQty += v.qty; totalAmt += amt;
      snapshot[k] = { name: v.name, price: v.price, qty: v.qty };
      rowsHtml += `<div class="result-row"><span class="result-row-label">${v.name}</span><span class="result-row-val">${v.qty}개 · ${fmt(amt)}</span></div>`;
    }
    rowsHtml += `<div class="result-row"><span class="result-row-label">총 수량</span><span class="result-row-val">${totalQty}개</span></div>`;
    rowsHtml += `<div class="result-row"><span class="result-row-label">결제 방법</span><span class="result-row-val">${payMethod}</span></div>`;

    let received = 0, change = 0;
    if (payMethod === '현금') {
      received = parseInt(document.getElementById('cashReceived').value) || 0;
      change = received - totalAmt;
      rowsHtml += `<div class="result-row"><span class="result-row-label">받은 돈</span><span class="result-row-val">${fmt(received)}</span></div>`;
      rowsHtml += `<div class="result-row"><span class="result-row-label">거스름돈</span><span class="result-row-val">${fmt(change)}</span></div>`;
    }

    history.unshift({ no: txNo++, items: snapshot, totalQty, totalAmt, pay: payMethod, received, change, time: new Date().toISOString(), memo: '' });
    save();

    document.getElementById('resAmount').textContent = fmt(totalAmt);
    document.getElementById('resRows').innerHTML = rowsHtml;
    document.getElementById('mainCard').classList.add('hidden');
    document.getElementById('resultCard').classList.remove('hidden');
  }

  function reset() {
    items.A.qty = 0; items.B.qty = 0;
    payMethod = null;
    ['A','B'].forEach(k => {
      document.getElementById('badge'+k).textContent = '0';
      document.getElementById('badge'+k).classList.remove('show');
      document.getElementById('pb'+k).classList.remove('has-qty');
    });
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('cashCalc').classList.add('hidden');
    document.getElementById('cashReceived').value = '';
    renderTable();
    updateCheckout();
    document.getElementById('resultCard').classList.add('hidden');
    document.getElementById('mainCard').classList.remove('hidden');
  }

  function renderHistory() {
    const dateSet = [...new Set(history.map(h => dateKey(h.time)))].sort((a,b) => b.localeCompare(a));
    const chipsEl = document.getElementById('dateChips');
    if (dateSet.length === 0) {
      chipsEl.innerHTML = '';
      selectedDate = null;
      renderStats([]);
      return;
    }
    if (!selectedDate || (!dateSet.includes(selectedDate) && selectedDate !== '전체')) selectedDate = dateSet[0];
    chipsEl.innerHTML = ['전체', ...dateSet].map(d => {
      const label = d === '전체' ? '전체' : dateLabel(d);
      return `<button class="date-chip ${d === selectedDate ? 'active' : ''}" onclick="selectDate('${d}', this)">${label}</button>`;
    }).join('');
    renderStats(getFiltered());
  }

  function getFiltered() {
    if (!selectedDate || selectedDate === '전체') return history;
    return history.filter(h => dateKey(h.time) === selectedDate);
  }

  function selectDate(d, btn) {
    selectedDate = d;
    document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    editingMemo = null;
    renderStats(getFiltered());
  }

  function renderStats(filtered) {
    const totalAmt = filtered.reduce((s,h) => s + h.totalAmt, 0);
    const totalQtyA = filtered.reduce((s,h) => s + (h.items.A ? h.items.A.qty : 0), 0);
    const totalQtyB = filtered.reduce((s,h) => s + (h.items.B ? h.items.B.qty : 0), 0);
    const cardList = filtered.filter(h => h.pay === '카드');
    const cashList = filtered.filter(h => h.pay === '현금');
    document.getElementById('statCount').textContent = filtered.length + '건';
    document.getElementById('statTotal').textContent = fmt(totalAmt);
    document.getElementById('statA').textContent = totalQtyA + '개';
    document.getElementById('statB').textContent = totalQtyB + '개';
    document.getElementById('statCard').textContent = fmt(cardList.reduce((s,h) => s + h.totalAmt, 0));
    document.getElementById('statCardCount').textContent = cardList.length + '건';
    document.getElementById('statCash').textContent = fmt(cashList.reduce((s,h) => s + h.totalAmt, 0));
    document.getElementById('statCashCount').textContent = cashList.length + '건';
    renderItems(filtered);
  }

  function renderItems(filtered) {
    const list = document.getElementById('historyList');
    if (filtered.length === 0) { list.innerHTML = '<div class="history-empty">아직 결제 내역이 없어요</div>'; return; }
    list.innerHTML = filtered.map(h => {
      const detail = Object.values(h.items).map(v => `${v.name} ${v.qty}개`).join(' · ');
      const t = new Date(h.time);
      const timeStr = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
      const isEditing = editingMemo === h.no;
      const hasMemo = h.memo && h.memo.trim().length > 0;
      const cashInfo = h.pay === '현금' && h.received
        ? `<div style="font-size:11px;color:#aaa;margin-top:2px;">받은돈 ${fmt(h.received)} · 거스름돈 ${fmt(h.change)}</div>`
        : '';
      const memoBlock = isEditing
        ? `<div class="memo-area"><textarea class="memo-input" id="memoInput_${h.no}" placeholder="메모를 입력하세요...">${h.memo||''}</textarea><div class="memo-save-row"><button class="memo-save-btn save" onclick="saveMemo(${h.no})">저장</button><button class="memo-save-btn" onclick="cancelMemo()">취소</button></div></div>`
        : hasMemo ? `<div class="memo-area"><div class="memo-text">${h.memo}</div></div>` : '';

      return `<div class="history-item" id="hitem_${h.no}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div class="history-item-no">#${h.no} · ${timeStr}</div>
            <div class="history-item-amount">${fmt(h.totalAmt)}</div>
            <div class="history-item-detail">${detail} · 총 ${h.totalQty}개</div>
            ${cashInfo}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">
            <span class="history-item-pay">${h.pay}</span>
            <div class="mini-actions">
              <button class="mini-btn" onclick="startMemo(${h.no})">${hasMemo?'메모수정':'메모추가'}</button>
              <button class="mini-btn delete-btn" id="delbtn_${h.no}"
                onmousedown="startDelete(event,${h.no})" onmouseup="cancelDelete()" onmouseleave="cancelDelete()"
                ontouchstart="startDelete(event,${h.no})" ontouchend="cancelDelete()" ontouchcancel="cancelDelete()">
                <div class="del-bg" id="delbg_${h.no}"></div><span class="del-label">길게눌러삭제</span>
              </button>
            </div>
          </div>
        </div>
        ${memoBlock}
      </div>`;
    }).join('');
  }

  function startMemo(no) {
    editingMemo = no;
    renderItems(getFiltered());
    const el = document.getElementById('memoInput_' + no);
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }
  function cancelMemo() { editingMemo = null; renderItems(getFiltered()); }
  function saveMemo(no) {
    const el = document.getElementById('memoInput_' + no);
    if (!el) return;
    const idx = history.findIndex(h => h.no === no);
    if (idx !== -1) { history[idx].memo = el.value.trim(); save(); }
    editingMemo = null;
    renderStats(getFiltered());
  }

  function startDelete(e, no) {
    e.preventDefault();
    deleteTarget = no;
    const bg = document.getElementById('delbg_' + no);
    if (bg) { bg.style.transition = 'width 1.5s linear'; bg.style.width = '100%'; }
    deleteTimer = setTimeout(() => { deleteItem(no); }, 1500);
  }
  function cancelDelete() {
    clearTimeout(deleteTimer);
    if (deleteTarget !== null) {
      const bg = document.getElementById('delbg_' + deleteTarget);
      if (bg) { bg.style.transition = 'none'; bg.style.width = '0%'; }
      deleteTarget = null;
    }
  }
  function deleteItem(no) {
    history = history.filter(h => h.no !== no);
    save(); editingMemo = null; deleteTarget = null;
    updateDrawerDisplay();
    renderHistory();
  }

  // 초기 시제 설정 안 되어 있으면 안내
  if (!localStorage.getItem('pos_drawer')) {
    setTimeout(() => {
      document.getElementById('drawerModal').classList.remove('hidden');
    }, 400);
  }
</script>
</body>
</html>
